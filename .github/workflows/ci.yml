name: Frontend CI

on:
  push:
    branches: [main, qa]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: ESLint
        run: npx next lint --max-warnings 999

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run unit tests
        run: npx vitest run

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_DOMAIN: api.echodesk.ge
          NEXT_PUBLIC_MAIN_DOMAIN: echodesk.ge
          NEXT_PUBLIC_API_BASE_URL: https://api.echodesk.ge
          NEXT_PUBLIC_DEFAULT_LANGUAGE: en
          NEXT_PUBLIC_PLATFORM: digitalocean
          NEXT_PUBLIC_TENANT_CONFIG_ENDPOINT: /api/tenant/config/
          NEXT_PUBLIC_TENANTS_LIST_ENDPOINT: /api/tenants/list/
          NEXT_PUBLIC_FACEBOOK_APP_ID: '778228344659402'
          # Sentry build-time vars (skip upload in CI unless secrets are set)
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
