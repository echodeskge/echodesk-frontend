# Copy to echodesk-frontend/.github/workflows/deploy.yml when ready to switch
# CI/CD from DigitalOcean to Hetzner. Until then, pushing to main still
# auto-deploys to DO App Platform — do NOT add this file there before cutover.
#
# Required repo secrets: SERVER_HOST (167.233.54.91), SSH_DEPLOY_KEY (private key
# for the `deploy` user on the server).
name: Deploy to Hetzner

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: deploy
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          command_timeout: 30m
          script: /opt/echodesk/infra/scripts/deploy-frontend.sh
